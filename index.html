<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontakt speichern</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; min-height: 100vh;
           margin: 0; background: #f5f5f5; }
    a { display: inline-block; padding: 12px 24px; background: #888;
        color: #fff; text-decoration: none; border-radius: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <script>
    const p = new URLSearchParams(location.search);
    const name  = p.get('n') || '';
    const phone = p.get('p') || '';
    if (name && phone) {
      const parts = name.split(' ');
      const vcf = 'BEGIN:VCARD\r\nVERSION:3.0\r\nFN:' + name
        + '\r\nN:' + parts.slice(1).join(' ') + ';' + parts[0] + ';;;\r\n'
        + 'TEL;TYPE=CELL:' + phone + '\r\nEND:VCARD\r\n';
      const blobUrl = URL.createObjectURL(new Blob([vcf], { type: 'text/vcard' }));

      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = name + '.vcf';
      document.body.appendChild(a);
      a.click();

      a.textContent = '⬇ Erneut herunterladen';
    }
  </script>
</body>
</html>
